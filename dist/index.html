<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="data:;base64,=" />
    <title>owl from scratch</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script type="importmap">
      { "imports": { "@odoo/owl": "./owl.js" } }
    </script>
    <link
      rel="styleSheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <style rel="styleSheet" href="./assets/css/style.css"></style>

    <script>
      FETCH_TEMPLATES = async () => {
        let s = document.querySelector('script[type="application/xml"]');
        return s ? s.text : await (await fetch("app.xml")).text();
      };
      DEV = false;
    </script>

    <link rel="stylesheet" href="app.css" />
  </head>
  <body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
